name: Ontime build

on:
  push:
    tags: [ "*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail fast if the pushed tag (e.g. v3.19.0-beta.0) does not match the
  # versions baked into the packages we publish. Prevents shipping a binary or
  # npm package whose number disagrees with the release tag.
  verify_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Check tag matches package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in package.json apps/cli/package.json apps/electron/package.json; do
            V=$(node -p "require('./$pkg').version")
            if [ "$V" != "$TAG" ]; then
              echo "::error::$pkg is $V but tag is $TAG. Run 'pnpm set-version $TAG' and re-tag."
              exit 1
            fi
            echo "$pkg OK ($V)"
          done

  build_macos:
    needs: verify_version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project packages
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build

      - name: Electron - Build and sign app
        env:
          APPLE_ID: ${{ secrets.APPLEID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLEIDPASS }}
          APPLE_TEAM_ID: ${{ secrets.TEAMID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: pnpm dist-mac --env-mode=loose
        timeout-minutes: 60

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./apps/electron/dist/ontime-macOS-x64.dmg
            ./apps/electron/dist/ontime-macOS-arm64.dmg
            ./apps/electron/dist/ontime-macOS-x64.zip
            ./apps/electron/dist/ontime-macOS-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    needs: verify_version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project packages
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build

      - name: Electron - Build app
        run: pnpm dist-win

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: './apps/electron/dist/ontime-win64.exe'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_ubuntu:
    needs: verify_version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project packages
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build

      - name: Electron - Build app
        run: pnpm dist-linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: './apps/electron/dist/ontime-linux.AppImage'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
